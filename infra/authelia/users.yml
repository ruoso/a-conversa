# Authelia users database — DEV ONLY
#
# Eighteen dev accounts for local development. All use the same dev password
# (see infra/authelia/README.md) so contributors can log in immediately
# after `make up` without a credential vault.
#
# DO NOT ship this file (or this password format) in production. Production
# Authelia uses a database-backed user store and federated upstream
# providers (per ADR 0002); these flat-file entries exist solely to make
# local dev and Playwright tests reproducible without external accounts.
#
# Password hash generated with:
#   docker run --rm authelia/authelia:latest \
#     authelia crypto hash generate argon2 --password 'aconversa-dev'
#
# All eighteen users share the same hash because the dev password is shared.
#
# The pool was originally seeded with six users by
# `tasks/refinements/foundation/dockerfile_mock_oauth.md`; it was expanded
# to twelve by
# `tasks/refinements/participant-ui/part_e2e_user_pool_expansion.md` so
# the participant-UI Playwright suite could drop `test.describe.serial`
# on `tests/e2e/participant-graph-render.spec.ts` and run its four
# blocks in parallel again, each with a distinct `{ creator, debater }`
# pair to avoid the in-file `users` upsert race. It was expanded again to
# eighteen by
# `tasks/refinements/participant-ui/part_e2e_user_pool_expansion_v2.md`
# to keep future participant/audience e2e blocks parallel (the 12-user
# pool was fully recycled across the spec's twelve blocks via the
# pair + role-swap doubling trick).

users:
  alice:
    displayname: 'Alice Example'
    password: '$argon2id$v=19$m=65536,t=3,p=4$JpiWZ31afMmtrS72rVRXrA$jy30rqZRty9UwAL/7WVCmC1nK7N9FlgW/J3fQ021BPs'
    email: alice@aconversa.local
    groups:
