          4EBVAmfR01YayD+7/dIYHwiMwSsw41MtMtZ3lMg8ZRQ6Zs08xoD3XtoUxcBU95VS
          6o0gMW3MWz4a6CFh0f4jouKsFIlW4O6hGNoYP2YFgL/z54adaqaQ1ghIdMgMQtEY
          J8b6h4e6+Uaw+sXbpxm/SBk=
          -----END PRIVATE KEY-----
    lifespans:
      access_token: '1 hour'
      authorize_code: '1 minute'
      id_token: '1 hour'
      refresh_token: '90 minutes'
    enable_client_debug_messages: true
    cors:
      endpoints:
        - authorization
        - token
        - revocation
        - introspection
        - userinfo
      allowed_origins_from_client_redirect_uris: true
    clients:
      - client_id: aconversa-app-dev
        client_name: 'a-conversa (dev)'
        # Dev-only client secret. Plaintext: 'aconversa-app-dev-secret'
        # (matches `OIDC_CLIENT_SECRET` in `.env.example`). Production
        # Authelia uses a different users backend and a rotated secret
        # held by `deployment.prod_secrets`. To rotate the dev hash:
        #   docker run --rm authelia/authelia:4.39 authelia crypto hash \
        #     generate pbkdf2 --password 'NEW-SECRET' --variant sha512 \
        #     --iterations 310000
        # then paste the resulting `Digest:` value below and update
        # `OIDC_CLIENT_SECRET` in `.env.example` to match. The pinning
        # regression class this hash drift causes is caught by the
        # `tests/e2e/auth-flow.spec.ts` Playwright suite (refinement:
        # `tasks/refinements/backend/auth_flow_integration.md`).
        client_secret: '$pbkdf2-sha512$310000$oPwTO7qcCKQwH7M.xa5NOA$EtFYuUT7zXVjD3o9xEZaw6637xzH.eU1V4xIXV4N1vRoqIX3/r8JmR.0gSKSAfzho.9M0AmiRoGzfNWk5PQmyQ'
        public: false
        authorization_policy: one_factor
        require_pkce: false
        pkce_challenge_method: ''
        redirect_uris:
          - 'http://localhost:5173/api/auth/callback'
          - 'http://localhost:3000/api/auth/callback'
        scopes:
          - openid
          - profile
          - email
          - offline_access
        response_types:
          - code
        grant_types:
          - authorization_code
          - refresh_token
        userinfo_signed_response_alg: none
        token_endpoint_auth_method: client_secret_basic
