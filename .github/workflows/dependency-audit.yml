# a-conversa — scheduled dependency vulnerability audit
#
# Owned by foundation.ci.ci_dependency_audit. Runs `pnpm audit` against
# the full dependency graph on a weekly cadence and surfaces the report
# both as an Actions job summary and as a downloadable JSON artifact.
#
# Cadence: weekly (Mondays 07:00 UTC). The npm advisory database does
# not change minute-to-minute; daily would be noise. Monday morning UTC
# means a fresh report is waiting at the start of the European/East-Coast
# work week without needing anyone to trigger it.
#
# This workflow is deliberately NON-blocking — it never fails a PR and
# never gates a release. Vulnerability fixes are triaged from the
# Actions summary / artifact, not from a red CI light.
#
# PR-side companion: ci.yml's `audit-warn` job runs `pnpm audit --prod`
# on every PR as a soft signal (also non-blocking). The two are
# intentional: PR-side covers prod deps fast and noisily-quiet, this
# scheduled job covers everything (incl. devDependencies) in depth.
#
# Not in scope here (sibling tools, separate decisions):
#   - Dependabot (.github/dependabot.yml) — automated update PRs
#   - Renovate — same space, different policy model
# Either / both can land in a follow-up without touching this workflow.

name: Dependency audit

on:
  schedule:
    # Mondays at 07:00 UTC. See top-of-file comment for the rationale.
    - cron: '0 7 * * 1'
  # Manual trigger so a maintainer can re-run after a known-fixed CVE
  # is published (or just to verify the report shape).
  workflow_dispatch:

permissions:
  contents: read

jobs:
  audit:
    name: pnpm audit (full graph)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node 20 with Corepack
        uses: actions/setup-node@v6
        with:
          # Same Node major as ci.yml / release.yml (ADR 0001 / 0015).
          node-version: '24'

      - name: Enable Corepack and activate pnpm
        # `packageManager` in root package.json pins pnpm@9.15.4
        # (ADR 0010). Corepack reads that pin.
        run: |
          corepack enable
          corepack prepare --activate

      - name: Resolve pnpm store path
        id: pnpm-store
        run: echo "path=$(pnpm store path --silent)" >> "$GITHUB_OUTPUT"

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-store.outputs.path }}
          key: pnpm-store-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            pnpm-store-${{ runner.os }}-

      - name: Install dependencies
        # HUSKY=0 mirrors ci.yml / release.yml / Dockerfile (ADR 0015):
        # no git hooks needed inside CI.
        env:
          HUSKY: '0'
        run: pnpm install --frozen-lockfile

      - name: Run pnpm audit
        # `|| true` so a non-zero pnpm-audit exit (which is exactly the
        # signal we want to capture) doesn't fail the step. The report
        # is the artifact, not the exit code.
        run: pnpm audit --json > audit.json || true

      - name: Upload audit report
        uses: actions/upload-artifact@v4
        with:
          name: pnpm-audit
          path: audit.json
          if-no-files-found: error

      - name: Summarize audit to job summary
        # Pragmatic summary: count vulnerabilities by severity using jq
        # (pre-installed on ubuntu-latest). pnpm audit --json emits a
        # `metadata.vulnerabilities` object keyed by severity. If the
        # JSON shape differs (older/newer pnpm), fall back to dumping
        # the head of the file so the summary is at least informative.
        run: |
          {
            echo "# pnpm audit summary"
            echo
            if jq -e '.metadata.vulnerabilities' audit.json > /dev/null 2>&1; then
              echo "| Severity | Count |"
              echo "| --- | --- |"
              jq -r '.metadata.vulnerabilities | to_entries[] | "| \(.key) | \(.value) |"' audit.json
            else
              echo "Could not parse \`metadata.vulnerabilities\` from audit.json."
              echo "First 100 lines of report:"
              echo
              echo '```json'
              head -n 100 audit.json
              echo '```'
            fi
            echo
            echo "Full JSON report is attached as the \`pnpm-audit\` artifact."
          } >> "$GITHUB_STEP_SUMMARY"
