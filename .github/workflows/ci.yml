# a-conversa — per-PR continuous integration
#
# This workflow is the safety net for everything Husky's pre-commit hook
# (ADR 0014) catches locally and a few things it deliberately doesn't
# (the smoke test suites). The pre-commit hook is best-effort; CI is
# authoritative.
#
# Structure (v1, owned by foundation.ci.ci_config / ADR 0019):
#
#   setup     — checkout, install pnpm via Corepack, install workspace
#               dependencies with --frozen-lockfile, populate the pnpm
#               store cache.
#   lint      — `pnpm lint` (eslint .). Own job per foundation.ci.ci_lint.
#   format    — `pnpm format:check` (prettier --check .). Own job per
#               foundation.ci.ci_format.
#   typecheck — three sequential `tsc -b` invocations (workspaces, tools,
#               tests). Own job per foundation.ci.ci_typecheck. The
#               TypeScript build cache (`*.tsbuildinfo`) is deliberately
#               NOT restored from CI cache — every CI run is a clean
#               type-check from cold (per refinement decision).
#   tests     — smoke-level test suites (unit, behavior, e2e). Currently
#               a single sequential job; the per-runner split below is
#               owned by downstream tasks.
#   build     — `pnpm run build` (recursive workspace build) plus a
#               buildx-based Docker image build with GHA layer cache,
#               followed by a smoke run of the resulting image. Owned
#               by foundation.ci.ci_build. Does NOT publish — publish
#               is foundation.ci.ci_image_publish (lives in release.yml).
#
# Forward pointers (extension points; do not implement here):
#
#   - foundation.test_infra.ci_unit_test_step       split `pnpm test:smoke` into its own job
#   - foundation.test_infra.ci_behavior_test_step   split `pnpm test:behavior:smoke` into its own job
#   - foundation.test_infra.ci_playwright_step      split `pnpm test:e2e:smoke` into its own job
#   - foundation.test_infra.test_db_provisioning    add Postgres + Authelia service containers
#                                                    (deferred until tests need a real DB)
#   - foundation.ci.ci_image_publish   lives in release.yml, not here
#
# .nvmrc / Volta is not used today; the Node major is pinned in this
# file. If/when a `.nvmrc` lands, switch `node-version` to
# `node-version-file: .nvmrc` in one place.

name: CI

on:
  push:
    branches:
      - main
  pull_request:

# Supersede in-progress runs on the same ref so PR pushes don't queue
# behind older, now-stale runs of the same branch. `main` pushes also
# group on their ref; the group key is per-ref, not global.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# Read-only token unless a downstream job explicitly requests more
# (image publish lives in release.yml, not here).
permissions:
  contents: read

jobs:
  setup:
    name: Setup (install + cache)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node 20 with Corepack
        uses: actions/setup-node@v4
        with:
          # Node major matches ADR 0001 (LTS we run) and ADR 0015
          # (Dockerfile base image). Keep these in lockstep.
          node-version: '20'

      - name: Enable Corepack and activate pnpm
        # `packageManager` in root package.json pins pnpm@9.15.4
        # (ADR 0010). Corepack reads that pin; no explicit version
        # here so the pin in package.json stays the single source of
        # truth.
        run: |
          corepack enable
          corepack prepare --activate

      - name: Resolve pnpm store path
        id: pnpm-store
        run: echo "path=$(pnpm store path --silent)" >> "$GITHUB_OUTPUT"

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-store.outputs.path }}
          key: pnpm-store-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            pnpm-store-${{ runner.os }}-

      - name: Install dependencies
        # HUSKY=0 mirrors the Dockerfile (ADR 0015 amendment): no git
        # hooks needed inside CI; `prepare` would otherwise install
        # the local hooks against the runner's checkout.
        env:
          HUSKY: '0'
        run: pnpm install --frozen-lockfile

  lint:
    # Split out of `checks` by foundation.ci.ci_lint. Runs `pnpm lint`
    # (eslint .) against the whole repo. Parallel with `format`,
    # `typecheck`, and `tests`; shares the pnpm store cache populated by
    # `setup`.
    name: Lint
    runs-on: ubuntu-latest
    needs: setup
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node 20 with Corepack
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Enable Corepack and activate pnpm
        run: |
          corepack enable
          corepack prepare --activate

      - name: Resolve pnpm store path
        id: pnpm-store
        run: echo "path=$(pnpm store path --silent)" >> "$GITHUB_OUTPUT"

      - name: Restore pnpm store cache
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-store.outputs.path }}
          key: pnpm-store-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            pnpm-store-${{ runner.os }}-

      - name: Install dependencies
        env:
          HUSKY: '0'
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm run lint

  format:
    # Split out of `checks` by foundation.ci.ci_format. Runs
    # `pnpm format:check` (prettier --check .) against the whole repo.
    # Parallel with `lint`, `typecheck`, and `tests`; shares the pnpm
    # store cache populated by `setup`.
    name: Format check
    runs-on: ubuntu-latest
    needs: setup
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node 20 with Corepack
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Enable Corepack and activate pnpm
        run: |
          corepack enable
          corepack prepare --activate

      - name: Resolve pnpm store path
        id: pnpm-store
        run: echo "path=$(pnpm store path --silent)" >> "$GITHUB_OUTPUT"

      - name: Restore pnpm store cache
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-store.outputs.path }}
          key: pnpm-store-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            pnpm-store-${{ runner.os }}-

      - name: Install dependencies
        env:
          HUSKY: '0'
        run: pnpm install --frozen-lockfile

      - name: Format check
        run: pnpm run format:check

  typecheck:
    # Split out of `checks` by foundation.ci.ci_typecheck. Runs the three
    # `tsc -b` invocations against the workspaces, the tools tree, and
    # the tests tree as three sequential steps in one job — each is fast
    # and they share the same TS environment, so splitting across three
    # jobs would just add cold-start overhead. Parallel with `lint`,
    # `format`, and `tests`; shares the pnpm store cache populated by
    # `setup`.
    #
    # Deliberately does NOT restore `*.tsbuildinfo` from CI cache: every
    # CI run is a clean type-check from cold (per refinement decision in
    # tasks/refinements/foundation/ci_typecheck.md). The pnpm store cache
    # is fine to reuse; only the TS incremental-build artifacts are kept
    # out of CI.
    name: Typecheck
    runs-on: ubuntu-latest
    needs: setup
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node 20 with Corepack
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Enable Corepack and activate pnpm
        run: |
          corepack enable
          corepack prepare --activate

      - name: Resolve pnpm store path
        id: pnpm-store
        run: echo "path=$(pnpm store path --silent)" >> "$GITHUB_OUTPUT"

      - name: Restore pnpm store cache
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-store.outputs.path }}
          key: pnpm-store-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            pnpm-store-${{ runner.os }}-

      - name: Install dependencies
        env:
          HUSKY: '0'
        run: pnpm install --frozen-lockfile

      - name: Typecheck — workspaces
        run: pnpm run typecheck

      - name: Typecheck — tools
        run: pnpm run typecheck:tools

      - name: Typecheck — tests
        run: pnpm run typecheck:tests

  tests:
    name: Tests (smoke suites)
    runs-on: ubuntu-latest
    needs: setup
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node 20 with Corepack
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Enable Corepack and activate pnpm
        run: |
          corepack enable
          corepack prepare --activate

      - name: Resolve pnpm store path
        id: pnpm-store
        run: echo "path=$(pnpm store path --silent)" >> "$GITHUB_OUTPUT"

      - name: Restore pnpm store cache
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-store.outputs.path }}
          key: pnpm-store-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            pnpm-store-${{ runner.os }}-

      - name: Install dependencies
        env:
          HUSKY: '0'
        run: pnpm install --frozen-lockfile

      # The Playwright suite no longer runs in this job: with the
      # single-origin deployment (moderator dist served via the
      # Fastify static-frontends plugin), real e2e specs need the
      # compose stack up. The dedicated `e2e-playwright` job below
      # (per frontend_i18n.i18n_testing) runs them against `make up`.
      # This job keeps unit + behavior smoke, which don't need a
      # browser binary or a running backend.

      # Build the moderator dist before the unit smoke suite — the
      # `static-frontends` Vitest cases load the SPA's `index.html`
      # to assert single-origin serving, and the plugin fail-fasts
      # at boot when the dist is absent.
      - name: Build moderator dist (prerequisite for static-frontends tests)
        run: pnpm --filter @a-conversa/moderator build

      - name: Unit smoke (foundation.test_infra.ci_unit_test_step will own this)
        run: pnpm run test:smoke

      - name: Behavior smoke (foundation.test_infra.ci_behavior_test_step will own this)
        run: pnpm run test:behavior:smoke

  e2e-playwright:
    # Owned by frontend_i18n.i18n_testing. Brings up the full compose
    # stack (postgres + authelia + app, with migrations on app
    # startup), waits for `/healthz`, runs the Playwright per-locale
    # suite against `http://localhost:3000`, captures traces on
    # failure, and tears the stack down with `-v` so the runner is
    # clean for the next job.
    #
    # The compose-driven path is the realistic one: the same Docker
    # image the `build` job produces, the same DB the production app
    # would talk to, the same Authelia config the OIDC plugin parses
    # at boot. The trade is wall-clock time (compose build + healthz
    # poll add ~1-2 minutes) — worth it because the Playwright suite
    # exercises the moderator SPA through the single-origin Fastify
    # server (per the `serve_static_frontends` task), which is the
    # production deployment shape.
    #
    # Browser binaries are installed CI-job-locally via
    # `playwright install chromium --with-deps`. Per ADR 0008's
    # `playwright_setup` boundary, the runtime Docker image never
    # bakes Chromium — it stays a runner-only concern.
    #
    # Env-var flow: the compose `app` service reads `.env` from the
    # repo root. The step below writes a CI-only `.env` ahead of
    # `make up` with the same env-var set the `Smoke test built image`
    # step in `build` uses (SESSION_TOKEN_SECRET, APP_BASE_URL,
    # OIDC_ISSUER_URL/CLIENT_ID/CLIENT_SECRET, DATABASE_URL). The
    # Authelia + Postgres credentials are already in `.env.example`;
    # `make up` copies that template when `.env` is absent, so the
    # CI-written `.env` only needs to override the values the smoke
    # path consumes.
    name: e2e (Playwright via compose)
    runs-on: ubuntu-latest
    needs: [setup, build]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node 20 with Corepack
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Enable Corepack and activate pnpm
        run: |
          corepack enable
          corepack prepare --activate

      - name: Resolve pnpm store path
        id: pnpm-store
        run: echo "path=$(pnpm store path --silent)" >> "$GITHUB_OUTPUT"

      - name: Restore pnpm store cache
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-store.outputs.path }}
          key: pnpm-store-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            pnpm-store-${{ runner.os }}-

      - name: Install dependencies
        env:
          HUSKY: '0'
        run: pnpm install --frozen-lockfile

      - name: Install Playwright Chromium (with deps)
        # Browser binaries are runner-local, never baked into the
        # production image. `--with-deps` pulls in the system libs
        # Chromium needs on the ubuntu-latest runner (libnss3, etc.).
        run: pnpm exec playwright install chromium --with-deps

      - name: Build i18n-catalogs (consumed by playwright.config.ts + e2e fixtures)
        # `playwright.config.ts` and `tests/e2e/fixtures/locales.ts`
        # import from `@a-conversa/i18n-catalogs`. Vitest resolves
        # workspace packages via the `source` export condition
        # (`vitest.config.ts`), so unit/behaviour suites run against
        # TS source with no upstream build. Playwright uses Node's
        # default resolver and falls through to `default` → `dist/`,
        # which only exists after `tsc -b`. The compose stack builds
        # workspace dists inside the Docker image, but those don't
        # leak back into the runner's `node_modules` tree — so we
        # build the one package the test harness reads on the runner.
        # `--filter ...^` would pull in its dependents; we only need
        # the package itself (it has no project references).
        run: pnpm --filter @a-conversa/i18n-catalogs build

      - name: Write CI .env for compose
        # `make up` reads `.env` for the env vars the `app` service
        # needs at boot. The values below mirror the `Smoke test
        # built image` step in the `build` job — the dev-default
        # secrets are fine here because no real client traffic ever
        # reaches this stack (the only consumer is Playwright on
        # localhost). The Postgres / Authelia credentials come from
        # `.env.example` via the make target's "cp if missing" path.
        run: |
          set -euo pipefail
          cp .env.example .env
          {
            echo "";
            echo "# --- e2e-playwright CI overrides ---";
            echo "SESSION_TOKEN_SECRET=0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef";
            echo "APP_BASE_URL=http://localhost:3000";
          } >> .env

      - name: Register authelia.aconversa.local in /etc/hosts
        # Required by `tests/e2e/auth-flow.spec.ts` (refinement:
        # `tasks/refinements/backend/auth_flow_integration.md`). The
        # OIDC redirect lands the browser on
        # `https://authelia.aconversa.local:9091/...`; that hostname
        # is a compose-network alias on the `authelia` service, so
        # the in-container resolver knows it but the runner-host
        # resolver does not. Without this entry the browser's first
        # navigation to Authelia fails at DNS resolution and the auth
        # spec falls over before reaching the login form. The
        # self-signed cert at `infra/authelia/tls/cert.pem` already
        # carries a SAN for this name, so TLS verifies against the
        # host-side resolution as well. The line is harmless for
        # every other test (the i18n smoke specs never traverse to
        # Authelia from the browser; the server-to-server discovery
        # path runs inside the compose network and uses the bridge
        # resolver). Documented in `docs/dev-environment.md` under
        # "Host resolution for Authelia".
        run: echo '127.0.0.1  authelia.aconversa.local' | sudo tee -a /etc/hosts

      - name: Bring up compose stack (prod-mode boot gates)
        # `make up-prod-mode` composes only `compose.yaml` — no dev
        # override. The dev override (`compose.dev.yaml`, used by
        # `make up` for local dev ergonomics) flips
        # `NODE_ENV=development` and relaxes the SESSION_TOKEN_SECRET
        # denylist + CORS lockdown + WS Origin allowlist. CI must
        # exercise the production boot gates so a regression that
        # only fires under `NODE_ENV=production` cannot pass locally
        # and fail in CI (or vice versa). The `Write CI .env`
        # step above supplies a 64-byte SESSION_TOKEN_SECRET +
        # APP_BASE_URL specifically to satisfy those gates here.
        run: make up-prod-mode

      - name: Wait for /healthz
        # `make up` already sleeps 30s for healthchecks; we still
        # poll explicitly so a slower start (cold image pull, slower
        # runner) doesn't break the suite with a connection refused.
        # 60s total ceiling matches the compose healthcheck's
        # `start_period` plus a few retries.
        run: |
          set -euo pipefail
          for i in $(seq 1 60); do
            if curl --fail --silent http://localhost:3000/healthz > /dev/null; then
              echo "/healthz OK after ${i}s"
              exit 0
            fi
            sleep 1
          done
          echo "/healthz never returned 200 within 60s"
          docker compose ps
          docker compose logs --tail 200
          exit 1

      - name: Run Playwright e2e suite
        env:
          PLAYWRIGHT_BASE_URL: http://localhost:3000
        run: pnpm run test:e2e

      - name: Dump compose logs on failure
        if: failure()
        run: docker compose logs --tail 200

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report
          retention-days: 7

      - name: Upload Playwright test results (traces, videos, screenshots)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-test-results
          path: test-results
          retention-days: 7

      - name: Tear down compose stack
        # `always()` so the teardown runs whether the suite passed,
        # failed, or the workflow was cancelled mid-run. `down -v`
        # drops the named volumes so the next job's `make up` is a
        # cold start.
        if: always()
        run: make down-v

  build:
    # Owned by foundation.ci.ci_build. Two parts:
    #   1. `pnpm run build` — recursive workspace build (root script is
    #      `pnpm -r build`). Today this is `tsc -b` for apps/server +
    #      packages/shared-types and placeholder echoes for the React
    #      frontends. The frontend bundlers will replace those echoes
    #      with real Vite builds without changing this job.
    #   2. Build the application Docker image (multi-stage; see
    #      docs/adr/0015-dockerfile-multi-stage-pnpm-corepack.md) via
    #      buildx with GHA-backed layer cache, then run a smoke check
    #      against the built image.
    #
    # Smoke check today is `docker run --rm` against the stub entry
    # point (which prints a banner and exits 0 — see ADR 0015). When
    # backend.api_skeleton lands the real `/healthz` endpoint, this
    # step gets a follow-up to do the HTTP probe (curl /healthz, expect
    # 200) — tracked on the ci_build refinement.
    #
    # Does NOT publish. Publish (push to a registry on tagged release)
    # is foundation.ci.ci_image_publish in release.yml.
    #
    # Parallel with `lint`, `format`, `typecheck`, and `tests`; shares
    # the pnpm store cache populated by `setup`. Buildx layer cache is
    # separate (type=gha, scoped to this job).
    name: Build
    runs-on: ubuntu-latest
    needs: setup
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node 20 with Corepack
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Enable Corepack and activate pnpm
        run: |
          corepack enable
          corepack prepare --activate

      - name: Resolve pnpm store path
        id: pnpm-store
        run: echo "path=$(pnpm store path --silent)" >> "$GITHUB_OUTPUT"

      - name: Restore pnpm store cache
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-store.outputs.path }}
          key: pnpm-store-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            pnpm-store-${{ runner.os }}-

      - name: Install dependencies
        env:
          HUSKY: '0'
        run: pnpm install --frozen-lockfile

      - name: Build workspaces
        # Root `build` script is `pnpm -r build` — walks every workspace.
        run: pnpm run build

      - name: Set up Docker Buildx
        # Required for `cache-from`/`cache-to` and the `gha` cache
        # backend below. Pinned to v3 (major).
        uses: docker/setup-buildx-action@v3

      - name: Build application image
        # `load: true` makes the resulting image available to the local
        # Docker daemon so the smoke step can `docker run` it; the GHA
        # cache backend (type=gha) gives free layer reuse across runs
        # of this workflow without us managing cache keys by hand.
        # `push: false` keeps publish strictly in ci_image_publish.
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          tags: aconversa/app:ci
          load: true
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke test built image
        # The CMD is the Fastify-based HTTP server bootstrap
        # (`apps/server/dist/index.js`). It runs as a long-lived
        # listener, so the smoke check has to (1) start the container
        # in the background, (2) probe `/healthz` until it returns 200
        # or a timeout fires, (3) tear the container down. The earlier
        # "banner-and-exit" stub from ADR 0015 is long gone.
        #
        # Required env (boot gates the production server enforces):
        #   - SESSION_TOKEN_SECRET — >= 32 bytes, not a dev placeholder.
        #     See `backend.session_secret_strength_check` (closes
        #     `docs/security/m3-review/auth.md` F-004). The 64-char hex
        #     literal below satisfies the gate without leaking secret
        #     material.
        #   - APP_BASE_URL — required when NODE_ENV=production by both
        #     the CORS-allowlist resolver (`backend.prod_cors_lockdown`
        #     closes F-003) AND `loadOidcConfig`. Pointed at localhost
        #     since this run never accepts real client traffic.
        #   - OIDC_ISSUER_URL / OIDC_CLIENT_ID / OIDC_CLIENT_SECRET —
        #     `loadOidcConfig` parses + URL-validates these at boot.
        #     The smoke run never reaches the OIDC discovery roundtrip
        #     (no HTTP call before app.listen succeeds), so any
        #     URL-shaped + non-empty values are fine.
        #   - DATABASE_URL — intentionally NOT set; the startup
        #     migration gate logs a warning and proceeds when absent
        #     (`apps/server/src/index.ts` boot path). The smoke check
        #     only verifies `/healthz`, which doesn't touch the DB.
        run: |
          set -euo pipefail
          docker run -d --name aconversa-ci-smoke \
            -p 3000:3000 \
            -e SESSION_TOKEN_SECRET=0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef \
            -e APP_BASE_URL=http://localhost:3000 \
            -e OIDC_ISSUER_URL=http://oidc.smoke.invalid \
            -e OIDC_CLIENT_ID=ci-smoke \
            -e OIDC_CLIENT_SECRET=ci-smoke-secret \
            aconversa/app:ci

          # Poll /healthz for up to 30 seconds. Each iteration prints
          # the container's tail so a failure has a stack trace inline
          # in the Actions log.
          for i in $(seq 1 30); do
            if curl --fail --silent --show-error http://localhost:3000/healthz > /dev/null; then
              echo "smoke OK after ${i}s"
              docker logs --tail 20 aconversa-ci-smoke
              docker stop aconversa-ci-smoke > /dev/null
              docker rm aconversa-ci-smoke > /dev/null
              exit 0
            fi
            sleep 1
          done

          echo "smoke FAILED — /healthz never returned 200 within 30s"
          docker logs aconversa-ci-smoke
          docker stop aconversa-ci-smoke > /dev/null || true
          docker rm aconversa-ci-smoke > /dev/null || true
          exit 1

  audit-warn:
    # Owned by foundation.ci.ci_dependency_audit. Soft signal: runs
    # `pnpm audit --prod` (production deps only) on every PR and never
    # fails the workflow. Trailing `|| true` is load-bearing — this job
    # surfaces vulns in the Actions log without gating merges, because
    # pnpm-audit output is too noisy/transient to block on.
    #
    # The authoritative, full-graph audit (incl. devDependencies, with
    # JSON artifact + job summary) is the weekly schedule defined in
    # .github/workflows/dependency-audit.yml.
    name: Dependency audit (warn-only)
    runs-on: ubuntu-latest
    needs: setup
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node 20 with Corepack
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Enable Corepack and activate pnpm
        run: |
          corepack enable
          corepack prepare --activate

      - name: Resolve pnpm store path
        id: pnpm-store
        run: echo "path=$(pnpm store path --silent)" >> "$GITHUB_OUTPUT"

      - name: Restore pnpm store cache
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-store.outputs.path }}
          key: pnpm-store-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            pnpm-store-${{ runner.os }}-

      - name: Install dependencies
        env:
          HUSKY: '0'
        run: pnpm install --frozen-lockfile

      - name: pnpm audit --prod (non-blocking)
        # `|| true` keeps the job green even when audit reports vulns.
        # Intentional: see job-level comment above.
        run: pnpm audit --prod || true
