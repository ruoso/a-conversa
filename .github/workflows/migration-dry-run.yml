# a-conversa — on-demand migration dry run (ADR 0034).
#
# Owned by deployment.deployment_tests.migration_dry_run
# (tasks/refinements/deployment/migration_dry_run.md). Runs
# `make migration-dry-run`: isolated postgres, baseline migrations
# from base_ref through the real node-pg-migrate runner, prod-sized
# generate_series seed, then the working tree's pending migrations —
# timed, with a budget, and sanity-checked (data survives, ledger
# matches the on-disk corpus).
#
# Manual-dispatch only — a pre-release drill (the release runbook
# invokes it ahead of any not-trivially-additive migration), not a
# per-merge gate: per-merge migration correctness is covered by the
# behavior suite (fresh-DB apply on every scenario) and the safety
# linter in ci.yml.

name: Migration dry run

on:
  workflow_dispatch:
    inputs:
      base_ref:
        description: 'Baseline ref (empty = origin/main; for a release drill use the tag in production)'
        required: false
        default: ''

permissions:
  contents: read

jobs:
  dry-run:
    name: Migration dry run (isolated postgres)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (full history — baseline extraction needs base_ref)
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Node 24 with Corepack
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Enable Corepack and activate pnpm
        run: |
          corepack enable
          corepack prepare --activate

      - name: Resolve pnpm store path
        id: pnpm-store
        run: echo "path=$(pnpm store path --silent)" >> "$GITHUB_OUTPUT"

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-store.outputs.path }}
          key: pnpm-store-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            pnpm-store-${{ runner.os }}-

      - name: Install dependencies
        env:
          HUSKY: '0'
        run: pnpm install --frozen-lockfile

      - name: Run the dry run
        env:
          BASE_REF: ${{ inputs.base_ref }}
        run: |
          # An empty input must be unset so the script's origin/main
          # default applies.
          if [ -z "${BASE_REF:-}" ]; then unset BASE_REF; fi
          make migration-dry-run
